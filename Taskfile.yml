version: '3'

vars:
  VERSION:
    sh: echo ${VERSION:-dev}
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  LDFLAGS: -X main.Version={{.VERSION}} -X main.CommitSHA={{.COMMIT}} -X main.BuildDate={{.BUILD_DATE}}

tasks:
  default:
    desc: Show available tasks
    silent: true
    cmds:
      - task --list

  dev:
    desc: Run backend + frontend dev server (open http://localhost:5173)
    deps: [serve, web-dev]

  serve:
    desc: Run backend without opening a browser (auto-reloads on Go file changes)
    cmds:
      - find . -name '*.go' -not -path './web/*' | entr -r go run main.go --no-open

  web-dev:
    desc: Run frontend dev server with HMR
    dir: web
    cmds:
      - npm run dev

  build:
    desc: Build single binary with embedded web assets
    deps: [build-web]
    cmds:
      - go build -ldflags "{{.LDFLAGS}}" -o vibediff .
    env:
      CGO_ENABLED: 0

  build-web:
    desc: Build the React frontend
    dir: web
    cmds:
      - npm run build

  install:
    desc: Install VibeDiff globally
    deps: [build-web]
    cmds:
      - go install -ldflags "{{.LDFLAGS}}"

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...


  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f vibediff vibediff-*
      - rm -rf web/dist

  release:
    desc: Build release binaries for all platforms
    deps: [build-web]
    env:
      CGO_ENABLED: 0
    cmds:
      - GOOS=linux GOARCH=amd64 go build -ldflags "{{.LDFLAGS}}" -o vibediff-linux-amd64 .
      - GOOS=linux GOARCH=arm64 go build -ldflags "{{.LDFLAGS}}" -o vibediff-linux-arm64 .
      - GOOS=darwin GOARCH=amd64 go build -ldflags "{{.LDFLAGS}}" -o vibediff-darwin-amd64 .
      - GOOS=darwin GOARCH=arm64 go build -ldflags "{{.LDFLAGS}}" -o vibediff-darwin-arm64 .
